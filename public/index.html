<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DOGE Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f23; color: #e0e0e0; min-height: 100vh; padding-bottom: 40px;
  }
  .header { text-align: center; padding: 24px 16px 8px; }
  .header .emoji { font-size: 48px; }
  .header h1 { color: #f5a623; font-size: 22px; margin: 8px 0; }
  .header .time { color: #888; font-size: 13px; }
  .live-badge { display: inline-block; background: #4caf50; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .card { background: #1a1a2e; border-radius: 16px; padding: 16px; margin: 12px 16px; border: 1px solid #2a2a4a; }
  .card-title { color: #f5a623; font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .price-row { display: flex; align-items: center; margin-bottom: 14px; }
  .price-value { color: #fff; font-size: 36px; font-weight: 800; flex: 1; }
  .change-badge { padding: 6px 12px; border-radius: 20px; font-size: 15px; font-weight: 700; color: #fff; }
  .change-up { background: #1b5e20; }
  .change-down { background: #b71c1c; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 8px; }
  .metric { text-align: center; padding: 8px 4px; }
  .metric .label { color: #888; font-size: 10px; margin-bottom: 4px; }
  .metric .value { color: #e0e0e0; font-size: 13px; font-weight: 600; }
  .phase-box { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.3); border-radius: 12px; padding: 12px; margin-bottom: 12px; text-align: center; }
  .phase-text { color: #f5a623; font-size: 15px; font-weight: 700; }
  .summary-text { color: #bbb; font-size: 14px; line-height: 1.7; margin-bottom: 12px; }
  .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .level { border-radius: 12px; padding: 12px; text-align: center; }
  .level.support { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.2); }
  .level.resist { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); }
  .level .lbl { font-size: 13px; color: #ccc; margin-bottom: 4px; }
  .level .val { font-size: 18px; font-weight: 800; color: #fff; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .pill { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: #ccc; }
  .pill b { color: #e0e0e0; }
  .footer { text-align: center; padding: 20px 16px; color: #555; font-size: 11px; line-height: 1.6; }
  .refresh-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; color: #888; font-size: 13px; }
  .refresh-btn { background: #f5a623; color: #1a1a2e; border: none; border-radius: 20px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .refresh-btn:active { opacity: 0.8; }
  .loading { text-align: center; padding: 60px 20px; color: #888; }
  .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #2a2a4a; border-top-color: #f5a623; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { text-align: center; padding: 60px 20px; color: #f44336; }
  .error .big { font-size: 48px; margin-bottom: 12px; }
  .age-bar { text-align: center; font-size: 11px; color: #555; padding: 4px; }
</style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div><div>抓取实时数据...</div></div>
</div>
<script>
// ── Live API sources ────────────────────────────────────
const CG_URL  = 'https://api.coingecko.com/api/v3/coins/dogecoin?localization=false&tickers=false&community_data=false&developer_data=false';
const BC_URL  = 'https://api.blockchair.com/dogecoin/stats';
const CACHE_KEY = 'doge_monitor_cache';
const DEPTH_KEY = 'doge_depth_snapshot';
const CACHE_MAX_AGE = 5 * 60 * 1000;
const BN_DEPTH_URL = 'https://api.binance.com/api/v3/depth?symbol=DOGEUSDT&limit=25';

// ── Helpers ─────────────────────────────────────────────
const F = n => { if (!n && n!==0) return '-'; if (n>=1e12) return '$'+(n/1e12).toFixed(2)+'T'; if (n>=1e9) return '$'+(n/1e9).toFixed(2)+'B'; if (n>=1e6) return '$'+(n/1e6).toFixed(2)+'M'; if (n>=1e3) return '$'+(n/1e3).toFixed(2)+'K'; return '$'+n.toFixed(2); };

async function fetchWithTimeout(url, ms) {
  ms = ms || 8000;
  return new Promise(function(resolve, reject) {
    var done = false;
    var timer = setTimeout(function() {
      if (!done) { done = true; reject(new Error('timeout')); }
    }, ms);
    fetch(url, { cache: 'no-cache' }).then(function(r) {
      if (done) return;
      clearTimeout(timer);
      if (!r.ok) { done = true; reject(new Error('HTTP ' + r.status)); return; }
      r.json().then(function(data) {
        if (!done) { done = true; resolve(data); }
      }).catch(function(e) {
        if (!done) { done = true; reject(e); }
      });
    }).catch(function(e) {
      if (!done) { done = true; clearTimeout(timer); reject(e); }
    });
  });
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (Date.now() - d._ts > CACHE_MAX_AGE) return null;
    return d;
  } catch { return null; }
}

function saveCache(p, c) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ p, c, _ts: Date.now() }));
  } catch {}
}

// ── Order Book Depth ───────────────────────────────────
async function fetchDepth() {
  try {
    const r = await fetchWithTimeout(BN_DEPTH_URL, 6000);
    return { bids: r.bids || [], asks: r.asks || [] };
  } catch { return null; }
}

function loadLastDepth() {
  try {
    const raw = localStorage.getItem(DEPTH_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveDepth(d) {
  try { localStorage.setItem(DEPTH_KEY, JSON.stringify({ ...d, _ts: Date.now() })); } catch {}
}

function analyzeDepth(current, previous) {
  if (!current) return { status: 'no_data' };

  const parse = (arr) => arr.map(([p, q]) => [parseFloat(p), parseFloat(q)]);
  const bids = parse(current.bids);
  const asks = parse(current.asks);

  // Top 5 levels
  const top5Bids = bids.slice(0, 5);
  const top5Asks = asks.slice(0, 5);
  const bestBid = top5Bids[0] || [0,0];
  const bestAsk = top5Asks[0] || [0,0];
  const spread = bestBid[0] > 0 ? ((bestAsk[0] - bestBid[0]) / bestAsk[0] * 100) : 0;

  // Wall detection: level with suddenly larger quantity
  const avgBidQty = top5Bids.reduce((s,b) => s+b[1], 0) / top5Bids.length;
  const avgAskQty = top5Asks.reduce((s,a) => s+a[1], 0) / top5Asks.length;
  const maxBidWall = top5Bids.reduce((max,b) => b[1] > max[1] ? b : max, [0,0]);
  const maxAskWall = top5Asks.reduce((max,a) => a[1] > max[1] ? a : max, [0,0]);

  // Total buy/sell pressure (top 25 levels)
  const totalBidVol = bids.reduce((s,b) => s + b[1]*b[0], 0);
  const totalAskVol = asks.reduce((s,a) => s + a[1]*a[0], 0);
  const buyRatio = (totalBidVol + totalAskVol) > 0 ? totalBidVol / (totalBidVol + totalAskVol) : 0.5;

  // Compare with previous snapshot
  let changes = [];
  if (previous && previous._ts) {
    const prevBuyRatio = previous._ratio || 0.5;
    const prevMaxBid = previous._maxBid || 0;
    const prevMaxAsk = previous._maxAsk || 0;

    if (buyRatio > prevBuyRatio + 0.05) changes.push('🟢 买盘力量增强');
    else if (buyRatio < prevBuyRatio - 0.05) changes.push('🔴 卖盘力量增强');

    if (maxBidWall[1] > prevMaxBid * 1.5) changes.push('🟢 买单墙加厚');
    if (maxAskWall[1] > prevMaxAsk * 1.5) changes.push('🔴 卖单墙加厚');
  }

  // Save for next comparison
  saveDepth({ _ratio: buyRatio, _maxBid: maxBidWall[1], _maxAsk: maxAskWall[1] });

  // Activity assessment
  let activity;
  if (changes.length > 0 && changes.some(c => c.includes('🟢'))) activity = '买盘增强 🟢';
  else if (changes.length > 0 && changes.some(c => c.includes('🔴'))) activity = '卖盘增强 🔴';
  else if (buyRatio > 0.55) activity = '买盘略强';
  else if (buyRatio < 0.45) activity = '卖盘略强';
  else activity = '买卖均衡';

  return {
    status: 'ok',
    activity,
    spread_pct: +spread.toFixed(4),
    bestBid: bestBid[0], bestBidQty: bestBid[1],
    bestAsk: bestAsk[0], bestAskQty: bestAsk[1],
    buyRatio: +(buyRatio * 100).toFixed(1),
    maxBidWall: { price: maxBidWall[0], qty: maxBidWall[1] },
    maxAskWall: { price: maxAskWall[0], qty: maxAskWall[1] },
    topBids: top5Bids,
    topAsks: top5Asks,
    changes,
    depthImbalance: buyRatio > 0.55 ? 'buy' : buyRatio < 0.45 ? 'sell' : 'neutral',
  };
}

// ── Analysis engine ─────────────────────────────────────
function analyze(p, c, cache) {
  const price = p.price_usd || 0;
  const ch24  = p.change_24h_pct || 0;
  const ch7d  = p.change_7d_pct || 0;
  const vol   = p.volume_24h_usd || 0;
  const mcap  = p.market_cap_usd || 1;
  const vr    = vol / mcap;
  const tx24  = c.transactions_24h || 0;
  const memp  = c.mempool_transactions || 0;
  const fee24 = c.fee_24h_usd || 0;
  const lt    = c.largest_transaction_24h_usd || 0;
  const cdd   = c.cdd_24h || 0;
  const hodl  = c.hodling_addresses || 0;
  const sfpb  = c.suggested_fee_per_byte || 0;

  // Phase
  let phase;
  if (ch24 > 5) phase = '短期强势上涨，关注能否放量突破';
  else if (ch24 > 2) phase = '短线企稳反弹';
  else if (ch24 < -5) phase = '短期急跌，关注下方支撑';
  else if (ch24 < -2) phase = '短线走弱，观望为主';
  else phase = '短线横盘震荡，等待方向选择';

  if (vr > 0.12) phase += '，换手率高';
  else if (vr < 0.03) phase += '，换手率极低，变盘在即';

  // ── Whale Score (0-100) ──────────────────────────────
  let score = 0, ws = [];

  // ─── 1. 币天销毁 CDD（最高权重 0-30） ─────────────────
  const cddPerTx = tx24 > 0 ? cdd / tx24 : 0;
  const cacheCDD = (cache && cache.c && cache.c.cdd_24h) ? cache.c.cdd_24h : cdd;

  if (cdd > cacheCDD * 3 && cdd > 1e10) {
    ws.push(`⚠️ CDD暴涨，老币在移动`);
  } else if (cdd > cacheCDD * 1.5 && cdd > 1e9) {
    score += 5; ws.push(`CDD上升，部分老币苏醒`);
  } else if (cdd < cacheCDD * 0.5 && cacheCDD > 0) {
    score += 25; ws.push(`🟢 CDD骤降，老币沉睡（囤币信号强）`);
  } else if (cddPerTx < 50000) {
    score += 20; ws.push('🟢 CDD极低，全网惜售');
  } else if (cddPerTx < 200000) {
    score += 12; ws.push('CDD偏低，持币倾向于不动');
  } else if (cddPerTx < 500000) {
    score += 5;
  }

  // ─── 2. 持币地址数（0-20） ────────────────────────────
  const cacheHodl = (cache && cache.c && cache.c.hodling_addresses) ? cache.c.hodling_addresses : hodl;
  const hodlChange = cacheHodl > 0 ? (hodl - cacheHodl) / cacheHodl : 0;

  if (hodlChange > 0.01) {
    score += 18; ws.push(`🟢 持币地址+${(hodlChange*100).toFixed(1)}%，分散吸筹`);
  } else if (hodlChange > 0.003) {
    score += 12; ws.push(`持币地址+${(hodlChange*100).toFixed(2)}%，缓慢增长`);
  } else if (hodlChange > 0) {
    score += 6;
  } else if (hodlChange < -0.01) {
    ws.push(`持币地址-${Math.abs(hodlChange*100).toFixed(1)}%，散户离场`);
  }

  // ─── 3. 费率拥堵度（0-15） ────────────────────────────
  if (sfpb > 1000000) {
    score += 15; ws.push(`🔥 费率极高，链上抢块激烈`);
  } else if (sfpb > 500000) {
    score += 10; ws.push(`费率偏高，网络繁忙`);
  } else if (sfpb > 200000) {
    score += 5;
  }

  // ─── 4. 总手续费（0-10） ──────────────────────────────
  if (fee24 > 50000)       { score += 10; ws.push(`手续费${F(fee24)}，重度使用`); }
  else if (fee24 > 20000)  { score += 7; ws.push(`手续费${F(fee24)}，较繁忙`); }
  else if (fee24 > 5000)   { score += 4; }

  // ─── 5. 最大单笔转账（0-15，降低权重） ─────────────────
  if (lt > 10000000)       { score += 15; ws.push(`最大单笔${F(lt)}`); }
  else if (lt > 1000000)   { score += 10; ws.push(`最大转账${F(lt)}`); }
  else if (lt > 100000)    { score += 5; }
  // Self-transfer: huge tx + tiny CDD = likely wallet housekeeping
  if (lt > 5000000 && cddPerTx < 100000 && tx24 > 0) {
    ws.push('⚠️ 大额但CDD极低，疑钱包整理');
  }

  // ─── 6. Mempool + TX（0-10） ─────────────────────────
  if (memp > 200)   { score += 5; ws.push(`Mempool拥堵(${memp}笔)`); }
  if (tx24 > 50000) { score += 5; ws.push(`日交易${(tx24/1000).toFixed(0)}k笔`); }

  // ── Activity label ───────────────────────────────────
  let wlvl;
  if (score >= 65)      wlvl = '高度活跃 🔥🔥';
  else if (score >= 40) wlvl = '温和活跃 🔥';
  else if (score >= 20) wlvl = '有动静';
  else                   wlvl = '低迷 💤';

  if (ws.length === 0) ws.push('链上无显著信号');

  const sup   = +(price * 0.93).toFixed(5);
  const res   = +(price * 1.07).toFixed(5);
  const msup  = +(price * 0.88).toFixed(5);
  const mres  = +(price * 1.12).toFixed(5);

  return {
    phase, sup, res, msup, mres,
    vr_pct: +(vr * 100).toFixed(1),
    whale: {
      status:'ok', activity_level: wlvl, activity_score: score,
      summary: ws.join('；'), largest_tx_24h_usd: lt,
      fee_total_24h_usd: fee24,
      avg_fee_usd: c.average_transaction_fee_24h_usd || 0,
      vol_mcap_ratio_pct: +(vr*100).toFixed(1),
      mempool_count: memp, tx_count_24h: tx24,
      cdd_24h: cdd,
      hodling_addresses: hodl,
      hodl_change_pct: +(hodlChange * 100).toFixed(3),
      suggested_fee_per_byte: sfpb,
    }
  };
}

// ── Render ──────────────────────────────────────────────
function buildDepthHTML(d, depthOk, depthFailed, depthLoading) {
  if (depthOk) {
    var ch = d.changes || [];
    var chHTML = ch.length > 0 ? '<div style="margin-top:8px;padding:8px 10px;background:rgba(66,133,244,0.08);border-radius:8px;font-size:12px;color:#90caf9;line-height:1.6;">' + ch.join('<br>') + '</div>' : '';
    return '<div class="card">' +
      '<div class="card-title">📊 盘口深度 <span style="font-size:11px;color:#888;">(Binance DOGE/USDT)</span></div>' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">' +
        '<div style="font-size:18px;font-weight:800;color:#fff;">' + d.activity + '</div>' +
        '<div style="font-size:11px;color:#888;">买卖比 ' + d.buyRatio + '% | 价差 ' + d.spread_pct + '%</div>' +
      '</div>' +
      '<div class="grid">' +
        '<div class="metric"><div class="label">💰 买一价</div><div class="value" style="color:#4caf50;">$' + (d.bestBid||0).toFixed(5) + '</div></div>' +
        '<div class="metric"><div class="label">买一量</div><div class="value">' + (d.bestBidQty||0).toLocaleString() + '</div></div>' +
        '<div class="metric"><div class="label">💰 卖一价</div><div class="value" style="color:#f44336;">$' + (d.bestAsk||0).toFixed(5) + '</div></div>' +
        '<div class="metric"><div class="label">卖一量</div><div class="value">' + (d.bestAskQty||0).toLocaleString() + '</div></div>' +
      '</div>' +
      '<div style="margin:8px 0;padding:8px;background:rgba(76,175,80,0.06);border-radius:8px;font-size:11px;color:#aaa;">🟢 买单墙：' + ((d.maxBidWall||{}).qty||0).toLocaleString() + ' DOGE @ $' + (((d.maxBidWall||{}).price||0).toFixed(5)) + '</div>' +
      '<div style="margin:8px 0;padding:8px;background:rgba(244,67,54,0.06);border-radius:8px;font-size:11px;color:#aaa;">🔴 卖单墙：' + ((d.maxAskWall||{}).qty||0).toLocaleString() + ' DOGE @ $' + (((d.maxAskWall||{}).price||0).toFixed(5)) + '</div>' +
      chHTML +
      '<div style="margin-top:6px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.03);text-align:center;font-size:11px;color:#666;">刷新对比上次快照 | 墙厚+50%触发提醒</div>' +
    '</div>';
  }
  var msg = depthFailed ? '⚠️ Binance API 暂不可用（需开VPN）' : depthLoading ? '⏳ 正在获取盘口数据...' : '⚠️ Binance API 超时，请确认 VPN 可访问 binance.com，然后刷新重试';
  return '<div class="card"><div class="card-title">📊 盘口深度 <span style="font-size:11px;color:#888;">(Binance DOGE/USDT)</span></div><div style="text-align:center;padding:24px;color:#888;font-size:13px;">' + msg + '</div></div>';
}

function render(p, c, a, liveTime, depthState) {
  const ch24 = p.change_24h_pct || 0, isUp = ch24 >= 0;
  const w = a.whale;
  const d = w.depth;
  const depthOk = d && d.status === 'ok';
  const depthFailed = d && d.status === 'no_data';
  const depthLoading = !d && depthState === 'loading';
  const depthHTML = buildDepthHTML(d, depthOk, depthFailed, depthLoading);

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="emoji">🐕</div>
      <h1>DOGE 实时看板 <span class="live-badge">LIVE</span></h1>
      <div class="time">数据时间: ${liveTime}</div>
    </div>

    <div class="card">
      <div class="card-title">💰 价格</div>
      <div class="price-row">
        <div class="price-value">$${p.price_usd?.toFixed(5) || 'N/A'}</div>
        <div class="change-badge ${isUp?'change-up':'change-down'}">${isUp?'+':''}${ch24.toFixed(2)}%</div>
      </div>
      <div class="grid">
        <div class="metric"><div class="label">24h高</div><div class="value">$${p.high_24h_usd?.toFixed(5)||'-'}</div></div>
        <div class="metric"><div class="label">24h低</div><div class="value">$${p.low_24h_usd?.toFixed(5)||'-'}</div></div>
        <div class="metric"><div class="label">7日</div><div class="value" style="color:${(p.change_7d_pct||0)>=0?'#4caf50':'#f44336'}">${p.change_7d_pct?.toFixed(1)||'-'}%</div></div>
        <div class="metric"><div class="label">30日</div><div class="value" style="color:${(p.change_30d_pct||0)>=0?'#4caf50':'#f44336'}">${p.change_30d_pct?.toFixed(1)||'-'}%</div></div>
      </div>
      <div class="grid">
        <div class="metric"><div class="label">市值</div><div class="value">${F(p.market_cap_usd)}</div></div>
        <div class="metric"><div class="label">排名</div><div class="value">#${p.market_cap_rank||'-'}</div></div>
        <div class="metric"><div class="label">24h量</div><div class="value">${F(p.volume_24h_usd)}</div></div>
        <div class="metric"><div class="label">流通量</div><div class="value">${(p.circulating_supply/1e9)?.toFixed(1)||'-'}B</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⛓️ 链上数据</div>
      <div class="grid">
        <div class="metric"><div class="label">24h交易</div><div class="value">${(c.transactions_24h||0).toLocaleString()}</div></div>
        <div class="metric"><div class="label">手续费</div><div class="value">$${(c.fee_24h_usd||0).toFixed(0)}</div></div>
        <div class="metric"><div class="label">Mempool</div><div class="value">${(c.mempool_transactions||0).toLocaleString()}</div></div>
        <div class="metric"><div class="label">节点</div><div class="value">${(c.nodes||0).toLocaleString()}</div></div>
      </div>
      <div class="grid">
        <div class="metric"><div class="label">平均手续费</div><div class="value">$${(c.average_transaction_fee_24h_usd||0).toFixed(4)}</div></div>
        <div class="metric"><div class="label">最大转账</div><div class="value">${F(c.largest_transaction_24h_usd)}</div></div>
        <div class="metric"><div class="label">24h输出</div><div class="value">${(c.outputs_24h||0).toLocaleString()}</div></div>
        <div class="metric"><div class="label">算力</div><div class="value">${(c.hashrate_24h||'N/A')}</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🐋 巨鲸动向 <span style="font-size:11px;color:#888;">(实时评分)</span></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <div style="font-size:24px;font-weight:800;color:#fff;">${w.activity_level}</div>
        <div style="font-size:11px;color:#888;padding:2px 8px;background:rgba(255,255,255,0.05);border-radius:10px;">活跃 ${w.activity_score}/100</div>
      </div>
      <div class="grid">
        <div class="metric"><div class="label">币天销毁CDD</div><div class="value" style="color:${(w.cdd_24h||0) < 1e9 ? '#4caf50' : '#f5a623'};font-size:15px;">${(w.cdd_24h/1e9).toFixed(2)}B</div></div>
        <div class="metric"><div class="label">持币地址</div><div class="value" style="font-size:15px;">${(w.hodling_addresses/1e6).toFixed(2)}M</div></div>
        <div class="metric"><div class="label">地址变化</div><div class="value" style="color:${(w.hodl_change_pct||0)>=0?'#4caf50':'#f44336'}">${(w.hodl_change_pct||0)>=0?'+':''}${w.hodl_change_pct}%</div></div>
        <div class="metric"><div class="label">费率</div><div class="value">${(w.suggested_fee_per_byte/1e6).toFixed(2)}M</div></div>
      </div>
      <div class="grid" style="margin-top:4px;">
        <div class="metric"><div class="label">最大单笔</div><div class="value" style="color:#ff6b6b;">${F(w.largest_tx_24h_usd)}</div></div>
        <div class="metric"><div class="label">总手续费</div><div class="value">${F(w.fee_total_24h_usd)}</div></div>
        <div class="metric"><div class="label">换手率</div><div class="value">${w.vol_mcap_ratio_pct}%</div></div>
        <div class="metric"><div class="label">Mempool</div><div class="value">${w.mempool_count}笔</div></div>
      </div>
      <div style="margin-top:10px;padding:10px;background:rgba(245,166,35,0.06);border-radius:10px;font-size:13px;color:#ccc;line-height:1.6;">
        ${w.summary}
      </div>
    </div>

    ${depthHTML}

    <div class="card">
      <div class="card-title">🧠 阶段判断</div>
      <div class="phase-box"><div class="phase-text">${a.phase}</div></div>
      <div class="levels">
        <div class="level support"><div class="lbl">🟢 支撑位</div><div class="val">$${a.sup}</div></div>
        <div class="level resist"><div class="lbl">🔴 阻力位</div><div class="val">$${a.res}</div></div>
      </div>
      <div class="levels">
        <div class="level support"><div class="lbl">🟢 强支撑</div><div class="val">$${a.msup}</div></div>
        <div class="level resist"><div class="lbl">🔴 强阻力</div><div class="val">$${a.mres}</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📜 历史对比</div>
      <div class="grid">
        <div class="metric"><div class="label">ATH</div><div class="value">$${p.ath_usd?.toFixed(4)||'-'}</div></div>
        <div class="metric"><div class="label">距ATH</div><div class="value" style="color:#f44336">${p.ath_usd?((p.price_usd/p.ath_usd-1)*100).toFixed(0):'-'}%</div></div>
        <div class="metric"><div class="label">ATL</div><div class="value">$${p.atl_usd?.toFixed(6)||'-'}</div></div>
        <div class="metric"><div class="label">距ATL</div><div class="value" style="color:#4caf50">${p.atl_usd?((p.price_usd/p.atl_usd-1)*100).toFixed(0):'-'}%</div></div>
      </div>
    </div>

    <div class="refresh-bar">
      <button class="refresh-btn" onclick="location.reload()">🔄 刷新实时数据</button>
    </div>

    <div class="age-bar" id="ageBar">数据 ${liveTime} 抓取</div>
    <div class="footer">CoinGecko + Blockchair 实时 · 仅供参考 · 不构成投资建议</div>
  `;
}

// ── Parse CoinGecko response ────────────────────────────
function parseCG(cg) {
  // Fallback format (GitHub backup JSON): { price: { price_usd: ... } }
  if (cg.price && cg.price.price_usd !== undefined) {
    const fb = cg.price;
    return {
      price_usd: fb.price_usd,
      change_24h_pct: fb.change_24h_pct,
      change_7d_pct: fb.change_7d_pct,
      change_30d_pct: fb.change_30d_pct,
      market_cap_usd: fb.market_cap_usd,
      volume_24h_usd: fb.volume_24h_usd,
      market_cap_rank: fb.market_cap_rank,
      ath_usd: fb.ath_usd,
      atl_usd: fb.atl_usd,
      high_24h_usd: fb.high_24h_usd,
      low_24h_usd: fb.low_24h_usd,
      circulating_supply: fb.circulating_supply,
    };
  }
  // CoinGecko live format
  const m = cg.market_data || {};
  return {
    price_usd: m.current_price?.usd,
    change_24h_pct: m.price_change_percentage_24h,
    change_7d_pct: m.price_change_percentage_7d,
    change_30d_pct: m.price_change_percentage_30d,
    market_cap_usd: m.market_cap?.usd,
    volume_24h_usd: m.total_volume?.usd,
    market_cap_rank: cg.market_cap_rank,
    ath_usd: m.ath?.usd,
    atl_usd: m.atl?.usd,
    high_24h_usd: m.high_24h?.usd,
    low_24h_usd: m.low_24h?.usd,
    circulating_supply: m.circulating_supply,
  };
}

function parseBC(bc) {
  const d = (bc && bc.data) ? bc.data : {};
  return {
    transactions_24h: d.transactions_24h || 0,
    fee_24h_usd: d.fee_24h_usd || 0,
    mempool_transactions: d.mempool_transactions || 0,
    nodes: d.nodes || 0,
    largest_transaction_24h_usd: (d.largest_transaction_24h && d.largest_transaction_24h.value_usd) || 0,
    outputs_24h: d.outputs_24h || 0,
    average_transaction_fee_24h_usd: d.average_transaction_fee_24h_usd || 0,
    median_transaction_fee_24h_usd: d.median_transaction_fee_24h_usd || 0,
    hashrate_24h: d.hashrate_24h || 'N/A',
    // New fields
    cdd_24h: d.cdd_24h || 0,
    hodling_addresses: d.hodling_addresses || 0,
    suggested_fee_per_byte: d.suggested_transaction_fee_per_byte_sat || 0,
  };
}

// ── Main ────────────────────────────────────────────────
async function main() {
  const now = new Date().toLocaleString('zh-CN');

  try {
    const [cg, bc, depth] = await Promise.all([
      fetchWithTimeout(CG_URL, 20000),
      fetchWithTimeout(BC_URL, 15000).catch(() => null),
      fetchDepth()
    ]);

    const p = parseCG(cg);
    const c = parseBC(bc);
    saveCache(p, c);
    const d = analyzeDepth(depth, loadLastDepth());
    const a = analyze(p, c, null);
    a.whale.depth = d;
    render(p, c, a, now, 'loaded');

  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="error">' +
        '<div class="big">🐕‍🦺</div>' +
        '<div style="font-size:18px;font-weight:700;margin-bottom:8px;">API 超时</div>' +
        '<div style="font-size:14px;color:#888;margin-bottom:16px;">' + e.message + '<br><br>CoinGecko / Blockchair 连接失败<br>请确认 VPN 已开启并刷新重试</div>' +
        '<button class="refresh-btn" onclick="location.reload()">重试</button>' +
      '</div>';
  }
}

main();
</script>
</body>
</html>
