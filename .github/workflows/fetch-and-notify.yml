name: DOGE Monitor - Fetch & Notify

on:
  schedule:
    # 9:00 AM Beijing time = 01:00 UTC
    - cron: "7 1 * * *"
    # 9:00 PM Beijing time = 13:00 UTC
    - cron: "7 13 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Grant write permission for pushing report files back
permissions:
  contents: write

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch DOGE data
        run: python scripts/fetch_data.py

      - name: Send push notifications
        env:
          EXPO_PUSH_TOKEN: ${{ secrets.EXPO_PUSH_TOKEN }}
          EXPO_PUSH_TOKENS: ${{ secrets.EXPO_PUSH_TOKENS }}
        run: python scripts/send_push.py

      - name: Commit & push report
        run: |
          git config user.name "DOGE Monitor Bot"
          git config user.email "bot@dogemonitor.dev"
          git add public/ reports/ push_tokens.json
          git diff --staged --quiet || (
            git commit -m "📊 Update DOGE report [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          )
