<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DOGE Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f23; color: #e0e0e0; min-height: 100vh; padding-bottom: 40px;
  }
  .header { text-align: center; padding: 24px 16px 8px; }
  .header .emoji { font-size: 48px; }
  .header h1 { color: #f5a623; font-size: 22px; margin: 8px 0; }
  .header .time { color: #888; font-size: 13px; }
  .live-badge { display: inline-block; background: #4caf50; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .card { background: #1a1a2e; border-radius: 16px; padding: 16px; margin: 12px 16px; border: 1px solid #2a2a4a; }
  .card-title { color: #f5a623; font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .price-row { display: flex; align-items: center; margin-bottom: 14px; }
  .price-value { color: #fff; font-size: 36px; font-weight: 800; flex: 1; }
  .change-badge { padding: 6px 12px; border-radius: 20px; font-size: 15px; font-weight: 700; color: #fff; }
  .change-up { background: #1b5e20; }
  .change-down { background: #b71c1c; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 8px; }
  .metric { text-align: center; padding: 8px 4px; }
  .metric .label { color: #888; font-size: 10px; margin-bottom: 4px; }
  .metric .value { color: #e0e0e0; font-size: 13px; font-weight: 600; }
  .phase-box { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.3); border-radius: 12px; padding: 12px; margin-bottom: 12px; text-align: center; }
  .phase-text { color: #f5a623; font-size: 15px; font-weight: 700; }
  .summary-text { color: #bbb; font-size: 14px; line-height: 1.7; margin-bottom: 12px; }
  .levels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .level { border-radius: 12px; padding: 12px; text-align: center; }
  .level.support { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.2); }
  .level.resist { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); }
  .level .lbl { font-size: 13px; color: #ccc; margin-bottom: 4px; }
  .level .val { font-size: 18px; font-weight: 800; color: #fff; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .pill { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: #ccc; }
  .pill b { color: #e0e0e0; }
  .footer { text-align: center; padding: 20px 16px; color: #555; font-size: 11px; line-height: 1.6; }
  .refresh-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; color: #888; font-size: 13px; }
  .refresh-btn { background: #f5a623; color: #1a1a2e; border: none; border-radius: 20px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .refresh-btn:active { opacity: 0.8; }
  .loading { text-align: center; padding: 60px 20px; color: #888; }
  .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #2a2a4a; border-top-color: #f5a623; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { text-align: center; padding: 60px 20px; color: #f44336; }
  .error .big { font-size: 48px; margin-bottom: 12px; }
  .age-bar { text-align: center; font-size: 11px; color: #555; padding: 4px; }
</style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div><div>抓取实时数据...</div></div>
</div>
<script>
// ── Live API sources ────────────────────────────────────
const CG_URL  = 'https://api.coingecko.com/api/v3/coins/dogecoin?localization=false&tickers=false&community_data=false&developer_data=false';
const BC_URL  = 'https://api.blockchair.com/dogecoin/stats';
const CACHE_KEY = 'doge_monitor_cache';
const CACHE_MAX_AGE = 5 * 60 * 1000; // 5 minutes

// ── Helpers ─────────────────────────────────────────────
const F = n => { if (!n && n!==0) return '-'; if (n>=1e12) return '$'+(n/1e12).toFixed(2)+'T'; if (n>=1e9) return '$'+(n/1e9).toFixed(2)+'B'; if (n>=1e6) return '$'+(n/1e6).toFixed(2)+'M'; if (n>=1e3) return '$'+(n/1e3).toFixed(2)+'K'; return '$'+n.toFixed(2); };

async function fetchWithTimeout(url, ms=8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { cache: 'no-cache', signal: ctrl.signal });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } finally { clearTimeout(timer); }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (Date.now() - d._ts > CACHE_MAX_AGE) return null;
    return d;
  } catch { return null; }
}

function saveCache(p, c) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ p, c, _ts: Date.now() }));
  } catch {}
}

// ── Analysis engine ─────────────────────────────────────
function analyze(p, c) {
  const price = p.price_usd || 0;
  const ch24  = p.change_24h_pct || 0;
  const ch7d  = p.change_7d_pct || 0;
  const vol   = p.volume_24h_usd || 0;
  const mcap  = p.market_cap_usd || 1;
  const vr    = vol / mcap;
  const tx24  = c.transactions_24h || 0;
  const memp  = c.mempool_transactions || 0;
  const fee24 = c.fee_24h_usd || 0;
  const lt    = c.largest_transaction_24h_usd || 0;
  const outp  = c.outputs_24h || 0;
  const af    = c.average_transaction_fee_24h_usd || 0;
  const mf    = c.median_transaction_fee_24h_usd || 0;

  // Phase
  let phase;
  if (ch24 > 5) phase = '短期强势上涨，关注能否放量突破';
  else if (ch24 > 2) phase = '短线企稳反弹';
  else if (ch24 < -5) phase = '短期急跌，关注下方支撑';
  else if (ch24 < -2) phase = '短线走弱，观望为主';
  else phase = '短线横盘震荡，等待方向选择';

  if (vr > 0.12) phase += '，换手率高';
  else if (vr < 0.03) phase += '，换手率极低，变盘在即';

  // ── Whale score (0-100) ──────────────────────────────
  let score = 0, ws = [];

  // 1. Largest single tx (most reliable indicator)
  if (lt > 10000000)       { score += 35; ws.push(`最大单笔${F(lt)}，千万级巨鲸出动`); }
  else if (lt > 5000000)   { score += 28; ws.push(`最大单笔${F(lt)}，大额转账`); }
  else if (lt > 1000000)   { score += 20; ws.push(`最大单笔${F(lt)}`); }
  else if (lt > 100000)    { score += 12; ws.push(`有${F(lt)}转账`); }
  else if (lt > 0)         { score += 4;  ws.push(`最大转账仅${F(lt)}`); }
  else                      { ws.push('暂无大额转账记录'); }

  // 2. Fee pressure (whales pay priority fees)
  if (fee24 > 50000)       { score += 20; ws.push(`手续费${F(fee24)}，网络重度使用`); }
  else if (fee24 > 20000)  { score += 14; ws.push(`手续费${F(fee24)}，网络较繁忙`); }
  else if (fee24 > 5000)   { score += 7; }
  else if (fee24 > 0)      { score += 3; }

  // 3. Fee distribution skew (avg >> median = whales overpaying)
  if (af && mf && mf > 0 && af / mf > 3)      { score += 15; ws.push('手续费严重不均，疑似巨鲸抢块'); }
  else if (af && mf && mf > 0 && af / mf > 2) { score += 8; }

  // 4. Mempool congestion
  if (memp > 200)      { score += 12; ws.push(`Mempool拥堵(${memp}笔待处理)`); }
  else if (memp > 100) { score += 7; ws.push(`Mempool ${memp}笔待处理`); }
  else if (memp > 50)  { score += 3; }

  // 5. Transaction count (chain usage)
  if (tx24 > 60000)       { score += 12; ws.push(`日交易${(tx24/1000).toFixed(0)}k笔，链上火爆`); }
  else if (tx24 > 40000)  { score += 7; }
  else if (tx24 > 20000)  { score += 3; }

  // ── Activity label ───────────────────────────────────
  let wlvl;
  if (lt <= 0 && score < 15)  wlvl = '链上安静 💤';
  else if (score >= 60)       wlvl = '高度活跃 🔥🔥';
  else if (score >= 35)       wlvl = '温和活跃 🔥';
  else if (score >= 15)       wlvl = '有动静';
  else                         wlvl = '低迷 💤';

  if (ws.length === 0) ws.push('近24h链上无明显活动');

  const sup   = +(price * 0.93).toFixed(5);
  const res   = +(price * 1.07).toFixed(5);
  const msup  = +(price * 0.88).toFixed(5);
  const mres  = +(price * 1.12).toFixed(5);

  return {
    phase, sup, res, msup, mres,
    vr_pct: +(vr * 100).toFixed(1),
    whale: {
      status:'ok', activity_level: wlvl, activity_score: score,
      summary: ws.join('；'), largest_tx_24h_usd: lt,
      fee_total_24h_usd: fee24,
      avg_fee_usd: af, vol_mcap_ratio_pct: +(vr*100).toFixed(1),
      mempool_count: memp, tx_count_24h: tx24,
    }
  };
}

// ── Render ──────────────────────────────────────────────
function render(p, c, a, liveTime) {
  const ch24 = p.change_24h_pct || 0, isUp = ch24 >= 0;
  const w = a.whale;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="emoji">🐕</div>
      <h1>DOGE 实时看板 <span class="live-badge">LIVE</span></h1>
      <div class="time">数据时间: ${liveTime}</div>
    </div>

    <div class="card">
      <div class="card-title">💰 价格</div>
      <div class="price-row">
        <div class="price-value">$${p.price_usd?.toFixed(5) || 'N/A'}</div>
        <div class="change-badge ${isUp?'change-up':'change-down'}">${isUp?'+':''}${ch24.toFixed(2)}%</div>
      </div>
      <div class="grid">
        <div class="metric"><div class="label">24h高</div><div class="value">$${p.high_24h_usd?.toFixed(5)||'-'}</div></div>
        <div class="metric"><div class="label">24h低</div><div class="value">$${p.low_24h_usd?.toFixed(5)||'-'}</div></div>
        <div class="metric"><div class="label">7日</div><div class="value" style="color:${(p.change_7d_pct||0)>=0?'#4caf50':'#f44336'}">${p.change_7d_pct?.toFixed(1)||'-'}%</div></div>
        <div class="metric"><div class="label">30日</div><div class="value" style="color:${(p.change_30d_pct||0)>=0?'#4caf50':'#f44336'}">${p.change_30d_pct?.toFixed(1)||'-'}%</div></div>
      </div>
      <div class="grid">
        <div class="metric"><div class="label">市值</div><div class="value">${F(p.market_cap_usd)}</div></div>
        <div class="metric"><div class="label">排名</div><div class="value">#${p.market_cap_rank||'-'}</div></div>
        <div class="metric"><div class="label">24h量</div><div class="value">${F(p.volume_24h_usd)}</div></div>
        <div class="metric"><div class="label">流通量</div><div class="value">${(p.circulating_supply/1e9)?.toFixed(1)||'-'}B</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⛓️ 链上数据</div>
      <div class="grid">
        <div class="metric"><div class="label">24h交易</div><div class="value">${(c.transactions_24h||0).toLocaleString()}</div></div>
        <div class="metric"><div class="label">手续费</div><div class="value">$${(c.fee_24h_usd||0).toFixed(0)}</div></div>
        <div class="metric"><div class="label">Mempool</div><div class="value">${(c.mempool_transactions||0).toLocaleString()}</div></div>
        <div class="metric"><div class="label">节点</div><div class="value">${(c.nodes||0).toLocaleString()}</div></div>
      </div>
      <div class="grid">
        <div class="metric"><div class="label">平均手续费</div><div class="value">$${(c.average_transaction_fee_24h_usd||0).toFixed(4)}</div></div>
        <div class="metric"><div class="label">最大转账</div><div class="value">${F(c.largest_transaction_24h_usd)}</div></div>
        <div class="metric"><div class="label">24h输出</div><div class="value">${(c.outputs_24h||0).toLocaleString()}</div></div>
        <div class="metric"><div class="label">算力</div><div class="value">${(c.hashrate_24h||'N/A')}</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🐋 巨鲸动向 <span style="font-size:11px;color:#888;">(实时评分)</span></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <div style="font-size:24px;font-weight:800;color:#fff;">${w.activity_level}</div>
        <div style="font-size:11px;color:#888;padding:2px 8px;background:rgba(255,255,255,0.05);border-radius:10px;">活跃指数 ${w.activity_score}/100</div>
      </div>
      <div class="grid">
        <div class="metric"><div class="label">最大单笔</div><div class="value" style="color:#ff6b6b;font-size:16px;">${F(w.largest_tx_24h_usd)}</div></div>
        <div class="metric"><div class="label">总手续费</div><div class="value">${F(w.fee_total_24h_usd)}</div></div>
        <div class="metric"><div class="label">换手率</div><div class="value">${w.vol_mcap_ratio_pct}%</div></div>
        <div class="metric"><div class="label">Mempool</div><div class="value">${w.mempool_count}笔</div></div>
      </div>
      <div style="margin-top:10px;padding:10px;background:rgba(245,166,35,0.06);border-radius:10px;font-size:13px;color:#ccc;line-height:1.6;">
        ${w.summary}
      </div>
    </div>

    <div class="card">
      <div class="card-title">🧠 阶段判断</div>
      <div class="phase-box"><div class="phase-text">${a.phase}</div></div>
      <div class="levels">
        <div class="level support"><div class="lbl">🟢 支撑位</div><div class="val">$${a.sup}</div></div>
        <div class="level resist"><div class="lbl">🔴 阻力位</div><div class="val">$${a.res}</div></div>
      </div>
      <div class="levels">
        <div class="level support"><div class="lbl">🟢 强支撑</div><div class="val">$${a.msup}</div></div>
        <div class="level resist"><div class="lbl">🔴 强阻力</div><div class="val">$${a.mres}</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📜 历史对比</div>
      <div class="grid">
        <div class="metric"><div class="label">ATH</div><div class="value">$${p.ath_usd?.toFixed(4)||'-'}</div></div>
        <div class="metric"><div class="label">距ATH</div><div class="value" style="color:#f44336">${p.ath_usd?((p.price_usd/p.ath_usd-1)*100).toFixed(0):'-'}%</div></div>
        <div class="metric"><div class="label">ATL</div><div class="value">$${p.atl_usd?.toFixed(6)||'-'}</div></div>
        <div class="metric"><div class="label">距ATL</div><div class="value" style="color:#4caf50">${p.atl_usd?((p.price_usd/p.atl_usd-1)*100).toFixed(0):'-'}%</div></div>
      </div>
    </div>

    <div class="refresh-bar">
      <button class="refresh-btn" onclick="location.reload()">🔄 刷新实时数据</button>
    </div>

    <div class="age-bar" id="ageBar">数据 ${liveTime} 抓取</div>
    <div class="footer">CoinGecko + Blockchair 实时 · 仅供参考 · 不构成投资建议</div>
  `;
}

// ── Parse CoinGecko response ────────────────────────────
function parseCG(cg) {
  const m = cg.market_data || {};
  return {
    price_usd: m.current_price?.usd,
    change_24h_pct: m.price_change_percentage_24h,
    change_7d_pct: m.price_change_percentage_7d,
    change_30d_pct: m.price_change_percentage_30d,
    market_cap_usd: m.market_cap?.usd,
    volume_24h_usd: m.total_volume?.usd,
    market_cap_rank: cg.market_cap_rank,
    ath_usd: m.ath?.usd,
    atl_usd: m.atl?.usd,
    high_24h_usd: m.high_24h?.usd,
    low_24h_usd: m.low_24h?.usd,
    circulating_supply: m.circulating_supply,
  };
}

function parseBC(bc) {
  const d = (bc && bc.data) ? bc.data : {};
  return {
    transactions_24h: d.transactions_24h || 0,
    fee_24h_usd: d.fee_24h_usd || 0,
    mempool_transactions: d.mempool_transactions || 0,
    nodes: d.nodes || 0,
    largest_transaction_24h_usd: (d.largest_transaction_24h && d.largest_transaction_24h.value_usd) || 0,
    outputs_24h: d.outputs_24h || 0,
    average_transaction_fee_24h_usd: d.average_transaction_fee_24h_usd || 0,
    median_transaction_fee_24h_usd: d.median_transaction_fee_24h_usd || 0,
    hashrate_24h: d.hashrate_24h || 'N/A',
  };
}

// ── Main ────────────────────────────────────────────────
async function main() {
  // 1. Show cached data immediately (instant render)
  const cache = loadCache();
  if (cache) {
    const a = analyze(cache.p, cache.c);
    const t = new Date(cache._ts).toLocaleString('zh-CN');
    render(cache.p, cache.c, a, t + ' (缓存)');
  }

  // 2. Fetch fresh data with timeout
  const now = new Date().toLocaleString('zh-CN');
  let p = cache ? cache.p : null;
  let c = cache ? cache.c : null;

  try {
    const [cg, bc] = await Promise.all([
      fetchWithTimeout(CG_URL, 10000),
      fetchWithTimeout(BC_URL, 8000).catch(() => null)
    ]);

    p = parseCG(cg);
    c = parseBC(bc);
    saveCache(p, c);

  } catch(e) {
    // If we have cache, just show it — silently fail
    if (cache) return;
    // No cache + API fail = show error
    document.getElementById('app').innerHTML = `
      <div class="error">
        <div class="big">🐕‍🦺</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:8px;">网络超时</div>
        <div style="font-size:14px;color:#888;margin-bottom:16px;">${e.message}<br>请检查网络后重试</div>
        <button class="refresh-btn" onclick="location.reload()">重试</button>
      </div>`;
    return;
  }

  // 3. Render fresh data
  const a = analyze(p, c);
  render(p, c, a, now);
}

main();
</script>
</body>
</html>
